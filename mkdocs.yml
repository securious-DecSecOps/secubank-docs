site_name: VulnBank MSA DevSecOps Golden Path
site_description: 금융권 보안담당자 실무를 Kubernetes 파이프라인으로 재현한 DevSecOps Golden Path PoC

theme:
  name: material
  language: ko
  icon:
    logo: material/shield-check
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드

plugins:
  - search
  - mermaid2:
      javascript: assets/javascripts/mermaid.esm.min.mjs

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 개요: index.md
  - 기술 블로그: overview.md
  - 아키텍처: architecture.md
  - CI 보안 파이프라인: ci-security-pipeline.md
  - 보안 시나리오: security-scenarios.md
  - 탐지 효능(정탐/오탐): detection-efficacy.md
  - 런타임 보안: runtime-security.md
  - 증적 & Triage: evidence-triage.md
