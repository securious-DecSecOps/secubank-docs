site_name: VulnBank MSA DevSecOps Golden Path
site_description: 금융권 보안담당자 실무를 Kubernetes 파이프라인으로 재현한 DevSecOps Golden Path PoC
site_url: https://securious-decsecops.github.io/secubank-docs/
repo_url: https://github.com/securious-DecSecOps/secubank-docs
repo_name: securious-DecSecOps/secubank-docs

theme:
  name: material
  language: ko
  custom_dir: overrides
  logo: assets/brand/logo.svg
  favicon: assets/brand/favicon.svg
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드

plugins:
  - search
  - social
  - mermaid2:
      javascript: assets/javascripts/mermaid.min.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format

extra_css:
  - https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/reveal.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false

nav:
  - 개요: index.md
  - 기술 블로그: overview.md
  - 실전 교본:
    - 교본 개요: textbook/index.md
    - 1화 · 그거 어디서 돌릴 건데요?: textbook/01-infra.md
    - 2화 · 근데 이걸 누가 다 돌려요?: textbook/02-pipeline.md
    - 3화 · API 키가 깃허브에 올라갔어요: textbook/03-gitleaks.md
    - 4화 · 음수로 송금했더니 잔액이 늘어요: textbook/04-sast.md
    - 5화 · 남의 거래내역이 보여요: textbook/05-dast.md
    - 6화 · 컨테이너가 root로 돌아요: textbook/06-iac.md
    - 7화 · 이미지에 CVE가 6천 개?: textbook/07-trivy.md
    - 8화 · 어제 통과한 게 오늘 위험해졌어요: textbook/08-sbom-rescan.md
    - 9화 · 등급 D인데 왜 통과됐죠?: textbook/09-security-gate.md
    - 10화 · 누가 운영 이미지를 손으로 바꿨어요: textbook/10-gitops.md
    - 11화 · 악성코드가 데이터를 빼돌려요: textbook/11-cilium.md
    - 12화 · 웹쉘이 떴는데 아무도 몰랐어요: textbook/12-falco.md
    - 13화 · 보안팀은 이걸 어디서 봐요?: textbook/13-defectdojo.md
    - 에필로그 · 그래서, axios를 막나요?: textbook/99-epilogue.md
  - 아키텍처: architecture.md
  - 보안 도구 원리: security-tools.md
  - CI 보안 파이프라인: ci-security-pipeline.md
  - 보안 시나리오: security-scenarios.md
  - 탐지 효능(정탐/오탐): detection-efficacy.md
  - 공급망 방어: supply-chain-defense.md
  - 증적 재현 런북: reproduce.md
  - 런타임 보안: runtime-security.md
  - 증적 & Triage: evidence-triage.md
  - ISMS-P 매핑: isms-p-mapping.md
  - 도입 가이드(온프레·하이브리드): adoption.md
  - 도입 시나리오(CI/CD 온보딩): onboarding-scenario.md
  - 코드·설정 맵: code-map.md
  - 한계 및 향후 과제: limitations.md
