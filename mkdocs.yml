site_name: VulnBank MSA DevSecOps Golden Path
site_description: Kubernetes DevSecOps Golden Path PoC documentation

theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: light mode

plugins:
  - search
  - mermaid2:
      javascript: assets/javascripts/mermaid.esm.min.mjs

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Introduction: index.md
  - Architecture: architecture.md
  - CI Security Pipeline: ci-security-pipeline.md
  - Security Scenarios: security-scenarios.md
  - Detection Efficacy: detection-efficacy.md
  - Runtime Security: runtime-security.md
  - Evidence & Triage: evidence-triage.md
