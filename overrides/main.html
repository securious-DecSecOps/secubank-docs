{#
  Material main.html 오버라이드 — extrahead에 외부 CDN preconnect만 추가.
  (Pretendard 폰트=cdn.jsdelivr.net, MathJax 엔진=unpkg.com) DNS/TLS 미리 연결로 LCP 개선.
  home.html이 {% extends "main.html" %}로 이 파일을 상속한다.
#}
{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
{% endblock %}
